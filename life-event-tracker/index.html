<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Event Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<!-- ── SIDEBAR ───────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <span class="brand-icon">✦</span>
      <span class="brand-name">Chronicle</span>
    </div>
    <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">✕</button>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-btn active" data-view="calendar">
      <span class="nav-icon">◫</span> Calendar
    </button>
    <button class="nav-btn" data-view="stats">
      <span class="nav-icon">◈</span> Statistics
    </button>
    <button class="nav-btn" data-view="search">
      <span class="nav-icon">◎</span> Search
    </button>
    <button class="nav-btn" data-view="categories">
      <span class="nav-icon">◉</span> Categories
    </button>
  </nav>

  <div class="sidebar-actions">
    <button class="action-btn" id="exportBtn">
      <span>↑</span> Export Backup
    </button>
    <label class="action-btn" id="importLabel">
      <span>↓</span> Import Backup
      <input type="file" id="importFile" accept=".json" style="display:none" />
    </label>
    <button class="action-btn theme-toggle" id="themeToggle">
      <span id="themeIcon">◐</span> <span id="themeLabel">Dark Mode</span>
    </button>
  </div>

  <div class="sidebar-doodle" aria-hidden="true">
    <svg viewBox="0 0 120 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="30" r="8" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
      <path d="M50 20 Q70 10 80 30 Q90 50 70 55" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <path d="M10 80 L30 60 L50 80 L70 60 L90 80" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <circle cx="100" cy="90" r="5" fill="currentColor" opacity="0.3"/>
      <circle cx="15" cy="130" r="3" fill="currentColor" opacity="0.4"/>
      <path d="M30 120 Q50 110 60 130 Q70 150 50 155" stroke="currentColor" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
      <path d="M80 140 L90 120 L100 140" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <circle cx="85" cy="165" r="6" stroke="currentColor" stroke-width="1.2" fill="none"/>
    </svg>
  </div>
</aside>

<!-- ── OVERLAY ───────────────────────────────────────── -->
<div class="overlay" id="overlay"></div>

<!-- ── MAIN CONTENT ──────────────────────────────────── -->
<main class="main-content">

  <!-- Top Bar -->
  <header class="topbar">
    <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
    <div class="topbar-title" id="topbarTitle">Calendar</div>
    <div class="topbar-right">
      <span class="entry-count-badge" id="entryCountBadge">0 entries</span>
    </div>
  </header>

  <!-- ── VIEW: CALENDAR ────────────────────────────── -->
  <section class="view active" id="view-calendar">
    <div class="calendar-controls">
      <button class="ctrl-btn" id="prevMonth">‹</button>
      <div class="month-year-display">
        <select id="monthSelect" class="month-year-select"></select>
        <select id="yearSelect" class="month-year-select"></select>
      </div>
      <button class="ctrl-btn" id="nextMonth">›</button>
      <button class="ctrl-btn today-btn" id="todayBtn">Today</button>
    </div>

    <div class="calendar-grid-wrapper">
      <div class="calendar-weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
        <div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- Mini legend -->
    <div class="calendar-legend" id="calendarLegend"></div>
  </section>

  <!-- ── VIEW: STATISTICS ──────────────────────────── -->
  <section class="view" id="view-stats">
    <div class="stats-grid">
      <div class="stat-card glass" id="statTotal">
        <div class="stat-num" id="statTotalNum">0</div>
        <div class="stat-label">Total Entries</div>
      </div>
      <div class="stat-card glass" id="statCategories">
        <div class="stat-num" id="statCatNum">0</div>
        <div class="stat-label">Categories</div>
      </div>
      <div class="stat-card glass" id="statMonth">
        <div class="stat-num" id="statMonthNum">0</div>
        <div class="stat-label">This Month</div>
      </div>
      <div class="stat-card glass" id="statYear">
        <div class="stat-num" id="statYearNum">0</div>
        <div class="stat-label">This Year</div>
      </div>
    </div>

    <div class="charts-row">
      <div class="chart-card glass">
        <h3 class="chart-title">Entries by Category</h3>
        <canvas id="chartCategory" height="220"></canvas>
      </div>
      <div class="chart-card glass">
        <h3 class="chart-title">Monthly Activity (This Year)</h3>
        <canvas id="chartMonthly" height="220"></canvas>
      </div>
    </div>

    <div class="chart-card glass full-width">
      <h3 class="chart-title">Yearly Overview</h3>
      <canvas id="chartYearly" height="180"></canvas>
    </div>

    <div class="category-breakdown glass" id="categoryBreakdown"></div>
  </section>

  <!-- ── VIEW: SEARCH ───────────────────────────────── -->
  <section class="view" id="view-search">
    <div class="search-bar-wrap">
      <span class="search-icon">◎</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Search notes, categories…" autocomplete="off" />
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <div class="search-filters" id="searchFilters"></div>
    <div class="search-results" id="searchResults">
      <div class="search-empty">
        <div class="empty-doodle">◎</div>
        <p>Start typing to search your entries</p>
      </div>
    </div>
  </section>

  <!-- ── VIEW: CATEGORIES ──────────────────────────── -->
  <section class="view" id="view-categories">
    <div class="categories-header">
      <h2 class="section-title">Category Manager</h2>
      <button class="btn-primary" id="addCategoryBtn">+ New Category</button>
    </div>
    <div class="categories-list" id="categoriesList"></div>
  </section>

</main>

<!-- ── MODAL: ENTRY MANAGER ──────────────────────────── -->
<div class="modal-backdrop" id="entryModal" role="dialog" aria-modal="true" aria-labelledby="entryModalTitle">
  <div class="modal glass">
    <div class="modal-header">
      <h2 class="modal-title" id="entryModalTitle">✦ Entries</h2>
      <button class="modal-close" id="entryModalClose">✕</button>
    </div>
    <div class="modal-date-display" id="entryModalDate"></div>

    <!-- Existing entries list -->
    <div class="entries-list" id="entriesList"></div>

    <!-- Add / Edit form -->
    <div class="entry-form" id="entryForm">
      <h3 class="form-subtitle" id="formSubtitle">New Entry</h3>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="formCategory"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <input type="color" class="form-color" id="formColor" value="#6366f1" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note</label>
        <textarea class="form-textarea" id="formNote" rows="3" placeholder="Write something…"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-ghost" id="formCancel">Cancel</button>
        <button class="btn-primary" id="formSave">Save Entry</button>
      </div>
    </div>

    <button class="btn-dashed" id="addEntryBtn">+ Add Entry</button>
  </div>
</div>

<!-- ── MODAL: CATEGORY FORM ──────────────────────────── -->
<div class="modal-backdrop" id="categoryModal" role="dialog" aria-modal="true" aria-labelledby="catModalTitle">
  <div class="modal glass modal-sm">
    <div class="modal-header">
      <h2 class="modal-title" id="catModalTitle">New Category</h2>
      <button class="modal-close" id="catModalClose">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="catName" placeholder="Category name…" maxlength="30" />
    </div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-presets" id="colorPresets"></div>
      <input type="color" class="form-color" id="catColor" value="#6366f1" />
    </div>
    <div class="form-actions">
      <button class="btn-ghost" id="catCancel">Cancel</button>
      <button class="btn-primary" id="catSave">Save</button>
    </div>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
